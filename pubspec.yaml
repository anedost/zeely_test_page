name: zeely_test_page
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/avatars/
    - assets/icons/
    - assets/images/
  fonts:
    - family: ItalianPlateNo2Expanded
      fonts:
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Ultralight.ttf
          weight: 100
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Ultralight Italic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Thin.ttf
          weight: 200
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Thin Italic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Extralight.ttf
          weight: 200
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Extralight Italic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Light.ttf
          weight: 300
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Light Italic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded.ttf
          weight: 400
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Medium.ttf
          weight: 500
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Medium Italic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Demibold.ttf
          weight: 600
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Demibold Italic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Bold.ttf
          weight: 700
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Bold Italic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Extrabold.ttf
          weight: 800
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Extrabold Italic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Black.ttf
          weight: 900
        - asset: assets/fonts/Italian Plate No2 Expanded/Italian Plate No2 Expanded Black Italic.ttf
          weight: 900
          style: italic
